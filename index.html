<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hoptix · IT Helpdesk</title>

    <!-- Preconnect to Supabase so DB calls start sooner -->
    <link rel="preconnect" href="https://yzgxiwmtqxelapznmsww.supabase.co" />

    <!-- Instant splash screen shown BEFORE React loads -->
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Inter', system-ui, sans-serif; background: #020e1f; }

      #splash {
        position: fixed; inset: 0; z-index: 99999;
        background: linear-gradient(135deg, #020e1f 0%, #041833 40%, #062d6b 100%);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 20px;
        transition: opacity 0.4s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }

      .splash-logo {
        display: flex; align-items: center; gap: 14px;
      }
      .splash-ring-outer {
        width: 52px; height: 52px; border-radius: 50%;
        background: linear-gradient(135deg, #fff 60%, #b3d9ff);
        display: flex; align-items: center; justify-content: center;
      }
      .splash-ring-inner {
        width: 32px; height: 32px; border-radius: 50%;
        background: linear-gradient(135deg, #0369a1, #0ea5e9);
        display: flex; align-items: center; justify-content: center;
      }
      .splash-dot {
        width: 12px; height: 12px; border-radius: 50%; background: #020e1f;
      }
      .splash-text { text-align: left; }
      .splash-title { color: #fff; font-size: 30px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
      .splash-sub { font-size: 12px; letter-spacing: 1px; margin-top: 2px; }
      .splash-sub span:nth-child(1) { color: #7dd3fc; }
      .splash-sub span:nth-child(2) { color: #38bdf8; font-style: italic; }
      .splash-sub span:nth-child(3) { color: #94a3b8; }

      .splash-spinner {
        width: 36px; height: 36px;
        border: 3px solid rgba(255,255,255,.15);
        border-top: 3px solid #0ea5e9;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .splash-msg { color: #7dd3fc; font-size: 13px; font-weight: 500; }

      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>

    <!-- This shows instantly, before any JS runs -->
    <div id="splash">
      <div class="splash-logo">
        <div class="splash-ring-outer">
          <div class="splash-ring-inner">
            <div class="splash-dot"></div>
          </div>
        </div>
        <div class="splash-text">
          <div class="splash-title">hoptix</div>
          <div class="splash-sub">
            <span>A.</span><span>eye</span><span> technology</span>
          </div>
        </div>
      </div>
      <div class="splash-spinner"></div>
      <div class="splash-msg">Loading your workspace…</div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <!-- Hide splash once React has mounted -->
    <script>
      // React sets this flag in main.jsx after render
      // Fallback: hide splash after 6s no matter what
      setTimeout(function() {
        var s = document.getElementById('splash');
        if (s) s.classList.add('hidden');
        setTimeout(function() { if (s) s.remove(); }, 500);
      }, 6000);

      // Listen for React ready signal
      window.__hideSplash = function() {
        var s = document.getElementById('splash');
        if (s) {
          s.classList.add('hidden');
          setTimeout(function() { if (s) s.remove(); }, 500);
        }
      };
    </script>
  </body>
</html>
